<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
    <title>Color Palette Generator</title>
</head>
<body>
    <div class="container">
        <h1>Color Palette Generator</h1>

        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Palette
        </button>
        <div class="palette-container">
            <div class="color-box">
                <div class="color" style="background-color: #331f00;"></div>
                <div class="color-info">
                    <span class="hex-value">#331F00</span>
                    <i class="far fa-copy copy-btn" title="Copy To Clip Board"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #00ff00;"></div>
                <div class="color-info">
                    <span class="hex-value">#00FF00</span>
                    <i class="far fa-copy copy-btn" title="Copy To Clip Board"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #33ff00;"></div>
                <div class="color-info">
                    <span class="hex-value">#33FF00</span>
                    <i class="far fa-copy copy-btn" title="Copy To Clip Board"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #2600ff;"></div>
                <div class="color-info">
                    <span class="hex-value">#2600FF</span>
                    <i class="far fa-copy copy-btn" title="Copy To Clip Board"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #aa0000;"></div>
                <div class="color-info">
                    <span class="hex-value">#AA0000</span>
                    <i class="far fa-copy copy-btn" title="Copy To Clip Board"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

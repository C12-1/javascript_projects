<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Quiz game</title>
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time</h1>
            <p>Test you knowledge with these funny questions !!!</p>
            <button id="start-btn">Start Quiz</button>

        </div>
        <div class="screen " id="quiz-screen">
            <div class="quiz-header">
                <h1 id="question-text">Question goese here</h1>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">0</span> of <span id="total-questions">5</span>
                    </p>
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>
            <div class="answers-container" id="answers-container">
                <!-- answers buttons will  be inserted here with js at some point later -->

            </div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        <div class="screen" id="result-screen">
            <h1>Quiz results</h1>
            <div class="result-info">
                <p>
                    You scored <span id="final-score">0</span> out of <span id="max-score">5</span>
                </p>
                <div id="result-message">Good job!</div>

            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
